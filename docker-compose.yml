services:
  db:
    image: postgres:15-alpine
    container_name: servervault-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: servervault
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      # Host 3001 avoids conflict when host:3000 is already used (e.g. Grafana)
      - "3001:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:3001
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DATABASE=servervault
      - SESSION_SECRET=servervault-docker-session-secret-min-32-chars
    depends_on:
      - db
    volumes:
      - server-data:/app/data

volumes:
  postgres-data:
  server-data:
