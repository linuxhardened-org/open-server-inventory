services:
  # ── Local PostgreSQL ───────────────────────────────────────────────────────
  # Not needed when DATABASE_URL points to Supabase.
  # To skip: comment out this service and the depends_on block in server.
  db:
    image: postgres:15-alpine
    container_name: servervault-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DATABASE:-servervault}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
    # Tracked `server/compose.env` — avoids missing `server/.env` on clone. Optional secrets: project-root `.env`.
    env_file:
      - ./server/compose.env
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:8080
      - SESSION_SECRET=${SESSION_SECRET:-servervault-docker-session-secret-change-in-production}
      # ── Option A: Local PostgreSQL (default when DATABASE_URL is empty) ──
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-servervault}
      # ── Option B: Supabase / external DB — set DATABASE_URL in project-root `.env` or export it ──
      - DATABASE_URL=${DATABASE_URL:-}
      # ── Optional: Redis for Socket.IO adapter (multi-instance) ──
      - REDIS_URL=${REDIS_URL:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - server-data:/app/data

volumes:
  postgres-data:
  server-data:
